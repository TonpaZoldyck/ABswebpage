<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Abdelhamid Ben Brahim | Data Engineer</title>
    <meta name="description" content="Technical writing on data engineering, pipeline performance, and analytics engineering from Abdelhamid Ben Brahim.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">AB</a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="blog.html" class="nav-active">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-overlay" id="nav-overlay"></div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Blog</h1>
            <p class="page-subtitle">Technical writing on data engineering, pipeline performance, and lessons from working in financial services.</p>
        </div>
    </section>

    <!-- Blog Listing -->
    <section>
        <div class="container">
            <div class="blog-list" id="blog-list">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <ul class="nav-links" style="justify-content: center; margin-bottom: 1.5rem;">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <p>&copy; 2026 Abdelhamid Ben Brahim. Data Engineer / Analytics Engineer.</p>
        </div>
    </footer>

    <script>
        // Mobile nav toggle
        const navToggle = document.getElementById('nav-toggle');
        const navLinks = document.getElementById('nav-links');
        const navOverlay = document.getElementById('nav-overlay');

        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            navOverlay.classList.toggle('active');
        });

        navOverlay.addEventListener('click', () => {
            navLinks.classList.remove('active');
            navOverlay.classList.remove('active');
        });

        // Load blog posts from content.json
        fetch('content/content.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('blog-list');
                if (!data.blogPosts || data.blogPosts.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-muted)">No posts yet. Check back soon.</p>';
                    return;
                }
                list.innerHTML = data.blogPosts.map(post => `
                    <article class="blog-item">
                        <span class="blog-date">${post.dateFormatted}</span>
                        <h2 class="blog-title"><a href="${post.url}">${post.title}</a></h2>
                        <p class="blog-summary">${post.summary}</p>
                        <div class="project-tags" style="margin-top:0.5rem; margin-bottom:1rem;">
                            ${post.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                        <a href="${post.url}" class="btn">Read Post &rarr;</a>
                    </article>
                `).join('');
            })
            .catch(() => {
                document.getElementById('blog-list').innerHTML = '<p style="color:var(--text-muted)">Unable to load posts.</p>';
            });
    </script>

</body>
</html>
